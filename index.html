<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="簡約心理測驗 — 探索你的思維傾向" />
  <title>北捷眾生怪</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="global-background" aria-hidden="true"></div>
  <div class="app">
    <div class="brand-logo">
      <img
        src="image/網頁副標.png"
        alt="心理測驗副標"
        class="site-subtitle"
      />
      <img
        src="image/logo03.png"
        alt="心理測驗標題"
        class="site-logo"
        id="home-title"
      />
    </div>

    <main class="main">
      <!-- 首頁 -->
      <section id="screen-home" class="screen screen--home screen--active" aria-labelledby="home-title">
        <div class="home-intro card card--home" id="home-intro">
          <p class="home-intro__text">
            你是一個每天都要搭上北捷上班上課的通勤族，某一天，你發現今天的北捷好像有點不一樣，你準備好這次怪怪的通勤時刻了嗎？
          </p>
        </div>
        <div class="home-cta">
          <button type="button" class="btn btn--primary" id="btn-start" autofocus>
            踏入車廂
          </button>
        </div>
      </section>

      <!-- 測驗中 -->
      <section id="screen-quiz" class="screen" aria-live="polite" aria-hidden="true">
        <div class="quiz-shell">
          <div class="progress-wrap">
            <div class="progress-meta">
              <span class="progress-label">進度</span>
              <span class="progress-count"><span id="progress-current">1</span> / <span id="progress-total">3</span></span>
            </div>
            <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="33" id="progress-bar-container">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
          </div>

          <div class="card card--question" id="question-card">
            <p class="question-index" id="question-index">題目 1</p>
            <h2 class="title title--md" id="question-text"></h2>
            <ul class="options" id="options-list" role="list"></ul>
            <div class="quiz-nav">
              <button type="button" class="btn-prev" id="btn-prev" hidden aria-label="回到上一題">
                上一題
              </button>
            </div>
          </div>
        </div>
      </section>

      <!-- 結果頁 -->
      <section id="screen-result" class="screen" aria-label="測驗結果">
        <div class="result-shell">
          <div id="capture-area" class="capture-area">
            <div class="capture-logo">
              <img
                src="image/logo03.png"
                alt="北捷眾生怪"
                class="capture-site-logo"
                decoding="async"
              />
            </div>
            <div class="result-image-wrap">
              <img
                id="result-image"
                src="image/包豬公.png"
                alt="你的測驗結果籤詩"
                decoding="async"
              />
            </div>
            <p class="capture-footer">© 北捷眾生怪．獨樂樂不如眾怪怪</p>
          </div>
          <div class="result-actions">
            <div class="result-buttons" role="group" aria-label="結果操作">
              <button type="button" class="btn btn--primary btn--copy-link" id="btn-copy-link">
                分享網頁連結
              </button>
              <div class="result-buttons-row">
                <button type="button" class="btn btn--ghost" id="btn-share">
                  分享結果
                </button>
                <button type="button" class="btn btn--primary btn--result-retry" id="btn-retry">
                  再玩一次
                </button>
              </div>
            </div>
            <p class="result-download-hint">
              提示：若無法下載，亦可長按圖片直接儲存籤詩喔！
            </p>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>© 北捷眾生怪．獨樂樂不如眾怪怪</p>
    </footer>
  </div>

  <!-- 隱形固定攝影棚：僅供分享導出，不影響畫面排版 -->
  <div id="hidden-photo-studio" aria-hidden="true">
    <img
      class="studio-logo"
      src="image/logo03.png"
      alt=""
    />
    <img
      id="studio-result-image"
      src="image/包豬公.png"
      alt=""
    />
    <p class="studio-footer">© 北捷眾生怪．獨樂樂不如眾怪怪</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
